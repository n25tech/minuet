<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Minuet is a minimalist productivity app designed to help you organize tasks, manage time precisely, and find your daily work rhythm.">
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.svg" />
  <title class="timer-display">Minuet</title>
  <script src="js/pomodoro.js" defer></script>
  <script src="js/todolist.js" defer></script>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/light_theme.css">
  <link rel="stylesheet" href="assets/css/dark_theme.css">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registered successfully:', reg.scope))
          .catch(err => console.error('Service Worker registration failed:', err));
      });
    }
  </script>
</head>

<body>
  <h1 hidden="true">Minuet</h1>
  <nav class="navbar">
    <span class="navbar-brand">Minuet</span>
  </nav>
  <div class="left-column">
    <div>
      <h3>To-do list</h3>
      <div id="todolist-table-container">
      </div>
      <input type="text" id="new-item-input" placeholder="New item">
        <button onclick="todoList.addItem()">Add</button>
      <div>
        <br />
        <button onclick="todoList.clearCompleted()">Clear Completed</button>
      </div>
    </div>
  </div>
  <div class="center-top-column">
    <div class="pomodoro-card">
      <h3>Pomodoro</h3>
      <p id="pomodoro-timer-display">00:00</p>
      <button id="pomodoro-toggle-button" onclick="pomodoroTimer.handleToggleBtn()">Start</button>
      <button onclick="pomodoroTimer.resetEngine()">reset</button>
    </div>
  </div>
  <div class="center-bottom-column"></div>
  <div class="right-column">
    <h3>Notes/Distraction Diary</h3>
    <textarea id="notes-area" placeholder="Write your notes here..."></textarea>
  </div>
</body>

</html>
